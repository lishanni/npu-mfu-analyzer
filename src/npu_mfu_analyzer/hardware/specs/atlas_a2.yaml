# Atlas 800T A2 / Atlas 900 A2 (Ascend 910B 系列) 芯片规格
# 参考: 华为昇腾 Atlas 系列产品规格

chips:
  - name: "Atlas 800T A2 910B"
    variant: "280T"
    aicore_count: 20
    aicore_freq_mhz: 1800
    cube_ops_per_cycle: 4096    # FP16: 16x16x16x2
    vector_ops_per_cycle: 256
    hbm_bandwidth_gbps: 1600    # 1.6 TB/s
    hbm_capacity_gb: 64
    hccs_bandwidth_gbps: 56     # per link
    hccs_links: 8
    pcie_bandwidth_gbps: 64     # Gen5 x16
    l2_cache_mb: 192
    peak_tflops_fp16: 280
    soc_name_patterns: ["Ascend910B", "910B", "Atlas800T"]

  - name: "Atlas 800T A2 910B"
