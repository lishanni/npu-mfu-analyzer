name: CI

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Compile core modules
        run: |
          python -m py_compile \
            src/npu_mfu_analyzer/cli/main.py \
            src/npu_mfu_analyzer/agents/orchestrator.py \
            src/npu_mfu_analyzer/llm/llm_interface.py

      - name: Run focused unit tests
        run: pytest -q tests/unit/test_llm.py tests/unit/test_data_loader.py tests/unit/test_diagnosis_skills.py

      - name: Run CLI smoke tests
        run: |
          npu-analyzer version
          npu-analyzer info examples/sample_profiling_small
          npu-analyzer summary examples/sample_profiling_small --max-steps 10
          npu-analyzer analyze examples/sample_profiling_small -b mock --no-host-device-correlation -o /tmp/report.md
          test -s /tmp/report.md

